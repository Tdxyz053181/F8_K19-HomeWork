<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập buổi 6</title>
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/base.css">
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/theme.css">
</head>

<body>

    <!--
        Phần tử này có: tag(h1) + class(.title) + id(#special) + inline style
        Selector thắng: inline style bởi vì có độ ưu tiên cao nhất vì là selector chi tiết nhất
        Mau hien thi: blue
    -->

    <h1 class="title" id="special" style="color: blue;">DASHBOARD</h1>
    <h2 class="section">Tong quan he thong</h2>

    <div class="big">
        <h3 class="title">Courses</h3>
        <p class="highlight">Mo ta Courses</p>

        <h3 class="title">Students</h3>
        <p class="highlight">Mo ta Students</p>

        <h3 class="title">Teachers</h3>
        <p class="highlight">Mo ta Teachers</p>

        <h3 class="title">Orders</h3>
        <p class="highlight">Mo ta Orders</p>

        <h3 class="title">Reports</h3>
        <p class="highlight">Mo ta Reports</p>
    </div>


    <style>
        h1 {
            background-color: cadetblue;
        }
    </style>
</body>

</html>
