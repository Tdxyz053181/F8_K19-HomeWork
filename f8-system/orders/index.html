<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập buổi 6</title>
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/base.css">
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/theme.css">
</head>

<body>
    <h1 style="color: black;">ORDERS PAGE</h1>

    <!--
        Phần tử này có: tag(h2) + class(.title) + id(#special) + inline style
        Selector thắng: inline style. Vì inline style có độ ưu tiên cao nhất (vì là selector chi tiết nhất)
        Màu hiển thị: chocolate
    -->
    <h2 class="title" id="special" style="color: chocolate;">Danh sach don hang</h2>

    <div>
        <p style="color: blue;">Don hang 001</p>
        <p style="color: blue;">Don hang 002</p>
        <p class="highlight">Don hang 003</p>
        <p class="highlight">Don hang 004</p>
    </div>
</body>
<style>
    h2 {
        background-color: aqua;
    }
</style>

</html>
