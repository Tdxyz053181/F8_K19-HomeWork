<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập buổi 6</title>
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/base.css">
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/theme.css">
</head>

<body>
    <h1>TEACHERS PAGE</h1>

    <!--Phần tử này có: tag(h2) + class(.title) + id(#special)
        Selector thắng: id(#special) vì id có độ ưu tiên cao hơn class và tag
        Tuy nhiên phần tử này bị override bởi theme.css
        Màu hiển thị: Purple
    -->
    <h2 class="title" id="special" style="font-size: medium;">Danh sach giang vien</h2>

    <h3 class="section">Giang vien HTML</h3>
    <h3 class="section">Giang vien CSS</h3>
    <h3 class="section">Giang vien Javascript</h3>
    <h3 class="section">Giang vien React</h3>
</body>

<!--Tại phần tử h3, màu chữ đang ăn theo css của class(.section) do đó để override màu của h3 ta cần css 
    cùng cấp selector là css vào class(.section)
    Quan sát ta thấy màu hiển thị đã bị ghi đè là màu gray
-->
<style>
    .section {
        color: gray;
    }

    h2 {
        background-color: black;
    }
</style>

</html>
