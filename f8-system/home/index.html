<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập buổi 6</title>
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/base.css">
    <link rel="stylesheet" href="/F8_K19-HomeWork/f8-system/css/theme.css">
</head>

<body>
    <!-- Phần tử này có: tag(h1) + class(.title) + id(#main)
        Selector thắng: #main vì id có độ ưu tiên lớn hơn class và tag
        Màu hiển thị: orange
    -->
    <h1 class="title" id="main">HOME PAGE</h1>

    <h2 class="title">Gioi thieu he thong</h2>
    <h3 class="section">Cac khoa hoc noi bat</h3>


    <!-- Kết quả h1 cho ra màu orange và h2 cho ra màu grey => h1 và h2 cho ra màu khác nhau
        Giải thích:
        Tại phần tử h1: id(#main) có độ ưu tiên cao nhất nên phần tử này ăn css theo #main(orange)
        Tại phần tử h2: class(.title) có độ ưu tiên cao hơn tag h2 nên thẻ h2 ăn css theo .title(brown) tuy nhiên đồng thời phần tử này bị 
        override bởi theme.css nên màu cuối cùng hiển thị trên website là grey
    -->
    <div>
        <p>HTML</p>
        <p>CSS</p>
        <p>Javascript</p>
        <p>Python</p>
    </div>

</body>

</html>
